<div class="page-wrapper">
    <div class="login-container">
        <h1>BIENVENIDO</h1>
        <p class="subtitle">Iniciá sesión para continuar</p>

        <form (ngSubmit)="onSubmit()">
            <div class="input-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" placeholder="tu&#64;email.com" [(ngModel)]="email" name="email"
                    required />
            </div>

            <div class="input-group">
                <label for="password">CONTRASEÑA</label>
                <input type="password" id="password" placeholder="••••••••" [(ngModel)]="password" name="password"
                    required />
            </div>

            <button type="submit">INGRESAR →</button>
        </form>

        <div class="divider">OR</div>

        <div class="social-login">
            <div class="social-btn">G</div>
            <div class="social-btn">F</div>
            <div class="social-btn">X</div>
        </div>

        <div class="footer">
            ¿No tenés cuenta?
            <a routerLink="/registro">Registrate</a>
        </div>
    </div>
</div>
